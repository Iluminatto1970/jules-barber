services:
  - type: web
    name: jules-barber
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: SAAS_DB_HOST
        sync: false
      - key: SAAS_DB_NAME
        sync: false
      - key: SAAS_DB_USER
        sync: false
      - key: SAAS_DB_PASS
        sync: false
